<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NEMT Care</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
    <main class="d-flex align-items-center justify-content-center vh-100">
        <div class="card p-4 border-0 shadow-sm rounded-4" style="max-width: 400px; width: 100%;">
            <div class="text-center mb-4">
                <a href="index.html"><img src="assets/images/logo.svg" alt="Logo" height="50"></a>
            </div>
            <h4 class="fw-bold text-center mb-4 text-primary">Sign In</h4>
            <form action="dashboard.html">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="d-flex justify-content-between mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label small" for="remember">Remember me</label>
                    </div>
                    <a href="#" class="small text-primary text-decoration-none">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Login to Account</button>
                <p class="text-center small mt-4 m-0">Don't have an account? <a href="register.html" class="text-primary text-decoration-none fw-bold">Register</a></p>
            </form>
        </div>
    </main>
    <script src="assets/js/main.js"></script>
</body>
</html>
