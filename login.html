<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VitalCare Medical Transport</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Source+Sans+3:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-body">

    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-top">
                <a href="index.html" class="logo auth-logo" aria-label="VitalCare Home">
                    <i class="logo-icon">A</i> <span>VitalCare</span>
                </a>
                <button type="button" id="theme-toggle" class="toggle-btn" title="Toggle theme"
                    aria-label="Toggle theme">🌙</button>
            </div>
            <h1>Welcome Back</h1>
            <p>Access your medical transport management.</p>
        </div>

        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember Me
                    </label>
                    <a href="#" class="forgot-password-link">Forgot Password?</a>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-auth">Login</button>
        </form>

        <div class="divider">OR</div>

        <button class="btn-social btn-google">
            <i class="fa-brands fa-google"></i> Continue with Google
        </button>
        <button class="btn-social btn-apple">
            <i class="fa-brands fa-apple"></i> Continue with Apple
        </button>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Register</a>
        </div>
    </div>

    <script>
        (function () {
            const html = document.documentElement;
            const btn = document.getElementById('theme-toggle');
            if (!btn) return;

            const setIcon = (theme) => {
                btn.textContent = theme === 'dark' ? '☀️' : '🌙';
            };

            const saved = localStorage.getItem('theme') || 'light';
            html.setAttribute('data-theme', saved);
            setIcon(saved);

            btn.addEventListener('click', () => {
                const current = html.getAttribute('data-theme') || 'light';
                const next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                setIcon(next);
            });
        })();

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            window.location.href = 'dashboard.html';
        });
    </script>
</body>

</html>
