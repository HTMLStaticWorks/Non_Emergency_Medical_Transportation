<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | NEMT Care</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
    <main class="d-flex align-items-center justify-content-center py-5">
        <div class="card p-4 border-0 shadow-sm rounded-4" style="max-width: 500px; width: 100%;">
            <div class="text-center mb-4">
                <a href="index.html"><img src="assets/images/logo.svg" alt="Logo" height="50"></a>
            </div>
            <h4 class="fw-bold text-center mb-4 text-primary">Create Account</h4>
            <form action="dashboard.html">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">First Name</label>
                        <input type="text" class="form-control" placeholder="John" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Last Name</label>
                        <input type="text" class="form-control" placeholder="Doe" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-bold">Email address</label>
                        <input type="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-bold">Account Type</label>
                        <select class="form-select">
                            <option>Patient / Family Member</option>
                            <option>Medical Facility Agent</option>
                            <option>Independent Driver</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-bold">Password</label>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="form-check mt-3 mb-4">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label small" for="terms">I agree to the <a href="#" class="text-primary text-decoration-none">Privacy Policy</a></label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3">Register Account</button>
                <p class="text-center small mt-4 m-0">Already have an account? <a href="login.html" class="text-primary text-decoration-none fw-bold">Login</a></p>
            </form>
        </div>
    </main>
    <script src="assets/js/main.js"></script>
</body>
</html>
