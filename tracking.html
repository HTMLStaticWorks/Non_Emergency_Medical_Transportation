<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Ride | NEMT Care</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="navbar-brand m-0 p-0"><img src="assets/images/logo.svg" alt="NEMT Care Logo" height="40"></a>
            <div class="nav-cta d-none d-lg-flex align-items-center">
                <button id="theme-toggle" class="btn p-2 border-0 bg-transparent"><i class="bi bi-sun-fill fs-5"></i></button>
                <a href="dashboard.html" class="btn btn-outline ms-2">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="py-0 overflow-hidden" style="height: calc(100vh - 72px);">
            <div class="row g-0 h-100">
                <!-- Map Placeholder -->
                <div class="col-lg-8 bg-secondary bg-opacity-10 d-flex align-items-center justify-content-center position-relative">
                    <div class="text-center opacity-50">
                        <i class="bi bi-geo-fill fs-1 text-primary mb-3"></i>
                        <h5>Interactive Map View</h5>
                        <p class="small">Google Maps API Component Loading...</p>
                    </div>
                </div>
                
                <!-- Tracking Info Sidebar -->
                <div class="col-lg-4 bg-white border-start p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold m-0 text-primary">Live Tracking</h4>
                        <span class="badge bg-success">On the Way</span>
                    </div>

                    <div class="card p-3 border-0 bg-light rounded-4 mb-4">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-primary bg-opacity-10 p-2 rounded-circle me-3">
                                <i class="bi bi-truck text-primary fs-4"></i>
                            </div>
                            <div>
                                <p class="small text-muted m-0">Vehicle ETA</p>
                                <h5 class="fw-bold m-0">12 Minutes</h5>
                            </div>
                        </div>
                        <div class="d-flex align-items-center">
                            <div class="bg-primary bg-opacity-10 p-2 rounded-circle me-3">
                                <i class="bi bi-person-circle text-primary fs-4"></i>
                            </div>
                            <div>
                                <p class="small text-muted m-0">Your Driver</p>
                                <h5 class="fw-bold m-0">Marcus Miller</h5>
                            </div>
                        </div>
                    </div>

                    <h6 class="fw-bold mb-3">Ride Status</h6>
                    <ul class="list-unstyled">
                        <li class="d-flex gap-3 mb-4 opacity-50">
                            <i class="bi bi-check-circle-fill text-success fs-5"></i>
                            <div>
                                <p class="fw-bold m-0 small">Ride Confirmed</p>
                                <p class="small m-0 text-muted">09:15 AM</p>
                            </div>
                        </li>
                        <li class="d-flex gap-3 mb-4">
                            <i class="bi bi-record-circle-fill text-primary fs-5"></i>
                            <div>
                                <p class="fw-bold m-0 small">Driver En Route</p>
                                <p class="small m-0 text-muted">Estimated arrival: 09:42 AM</p>
                            </div>
                        </li>
                        <li class="d-flex gap-3 mb-4 opacity-25">
                            <i class="bi bi-record-circle text-muted fs-5"></i>
                            <div>
                                <p class="fw-bold m-0 small">Patient Picked Up</p>
                                <p class="small m-0 text-muted">Waiting...</p>
                            </div>
                        </li>
                    </ul>

                    <button class="btn btn-primary w-100 py-3 mt-4">Contact Driver</button>
                    <button class="btn btn-outline w-100 py-3 mt-2">Help / Emergency</button>
                </div>
            </div>
        </section>
    </main>
    <script src="assets/js/main.js"></script>
</body>
</html>
